<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chef Chef Harfer · Pedido confirmado</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Georgia', serif;
      background: #faf8f4;
      color: #2d2d2d;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo {
      font-size: 1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 0.25rem;
    }
    .brand {
      font-size: 1.8rem;
      font-weight: bold;
      color: #2d2d2d;
      margin-bottom: 2rem;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }
    .titulo {
      font-size: 1.5rem;
      font-weight: bold;
      color: #2d7a3a;
      margin-bottom: 0.75rem;
    }
    .mensaje {
      font-size: 1rem;
      color: #555;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .order-id {
      background: #f0f7f1;
      border: 1px solid #c8e6c9;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      color: #2d7a3a;
      margin-bottom: 2rem;
      word-break: break-all;
    }
    .btn {
      display: inline-block;
      background: #2d7a3a;
      color: white;
      padding: 0.9rem 2rem;
      border-radius: 50px;
      text-decoration: none;
      font-size: 1rem;
      font-weight: bold;
      transition: background 0.2s;
    }
    .btn:hover { background: #235f2d; }
    .error .titulo { color: #c0392b; }
    .error .order-id { background: #fdf0ef; border-color: #f5c6c2; color: #c0392b; }
    footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <img src="https://raw.githubusercontent.com/chefchefharfer/chefchefharfer/main/Logo%20chef%20chef.png" alt="Chef Chef Harfer" style="height:80px; margin-bottom:1.5rem;">
    <div class="icon" id="icon">✅</div>
    <div class="titulo" id="titulo">¡Pedido confirmado!</div>
    <div class="mensaje" id="mensaje">Tu pago fue procesado exitosamente. Recibirás un correo con los detalles de tu pedido.</div>
    <div class="order-id" id="order-info" style="display:none"></div>
    <a href="https://chefchefharfer.mx" class="btn">Volver al inicio</a>
  </div>
  <footer>© 2026 Chef Chef Harfer · Tepatitlán de Morelos, Jalisco</footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    const status = params.get('status');
    const order = params.get('order') || params.get('id');

    if (status === 'error' || (status && status !== 'success')) {
      document.getElementById('icon').textContent = '❌';
      document.getElementById('titulo').textContent = 'Hubo un problema con tu pago';
      document.getElementById('titulo').style.color = '#c0392b';
      document.getElementById('mensaje').textContent = 'No se pudo procesar tu pago. Por favor intenta de nuevo o contáctanos por WhatsApp.';
      document.getElementById('card').classList.add('error');
    }

    if (order) {
      const el = document.getElementById('order-info');
      el.style.display = 'block';
      el.textContent = 'Folio: ' + order;
    }
  </script>
</body>
</html>
